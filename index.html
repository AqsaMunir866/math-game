<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Match Mini Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-container">
    <h1>Math Match Mini Game</h1>
    <p>Answer 5 arithmetic questions correctly to win.</p>
    <div class="question-box">
      <div id="question">Loading question...</div>
      <input id="answerInput" type="number" placeholder="Your answer" />
      <button id="submitBtn">Submit</button>
    </div>
    <div class="status-board">
      <p id="feedback"></p>
      <p>Correct answers: <span id="score">0</span>/5</p>
    </div>
    <button id="restartBtn" class="secondary">Restart Game</button>
  </div>
  <script src="game.js"></script>
</body>
</html>
